<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schedule a Call — Voicerely</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,800;1,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        'v-black': '#020205',
                        'v-dark': '#0b0b10',     
                        'v-border': '#151522',       
                        'v-muted': '#a1a1aa',        
                        'v-orange': '#f97316'        
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-v-black text-v-muted font-sans antialiased">
    <main class="w-full py-20">
        <div class="max-w-2xl mx-auto px-4 text-center">
            <h1 class="text-3xl md:text-4xl font-extrabold text-white [.light_&]:text-gray-900 mb-4">Schedule a Call</h1>
            <p class="text-lg text-v-muted [.light_&]:text-gray-600 mb-8">Book a time to discuss your AI voice needs.</p>
            <div class="bg-v-dark/50 border border-v-border [.light_&]:bg-gray-50 rounded-2xl p-8">
                <p class="text-v-orange mb-4">Placeholder - Booking integration pending</p>
                <p class="text-sm text-zinc-400">Contact: <a href="mailto:hello@voicerely.com" class="text-v-orange">hello@voicerely.com</a></p>
            </div>
            <a href="index.html" class="inline-block mt-8 text-v-orange hover:text-orange-400">← Back to homepage</a>
        </div>
    </main>
    <script src="js/theme.js"></script>
</body>
</html>
